services:
  ai-opslog-backend:
    image: ai-opslog-backend:latest 
    container_name: ai-opslog-backend
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL}
      - QWEN_MODEL=${QWEN_MODEL}
      - AI_OPSLOG_DB_PATH=${AI_OPSLOG_DB_PATH:-data/ai_opslog.db}
      - ALERTMANAGER_WEBHOOK_TOKEN=${ALERTMANAGER_WEBHOOK_TOKEN:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
